      │ Camera001 | http://... | BASIC | 1分 | FullHD | 編集 削除 接続 │
      │ Camera002 | http://... | BASIC | 5分 | VGA    | 編集 削除 接続 │
      └────────────────────────────────────────────────────────────┘

  camera_form_screen:
    description: "カメラ登録・再設定共通画面の概念レイアウト"
    ascii: |
      ┌──────────────────────────────┐
      │ カメラ追加 / カメラ再設定      │
      ├──────────────────────────────┤
      │ カメラ名      [             ] │
      │ アドレス      [             ] │
      │ 認証方式      [BASIC認証 ▼  ] │
      │ ID            [             ] │
