# ==============================================================================
# 03_ui_spec.yaml
# ==============================================================================
# システム名:
#   インターネットカメラ静止画管理システム
#
# 目的:
#   本ファイルでは、画面構成、画面遷移、UI部品、権限別表示制御、
#   操作イベント、入力項目、バリデーション、画面更新仕様を定義する。
#
# 本ファイルの位置づけ:
#   - 01_overall_spec.yaml で定義した全体仕様をもとに、UI仕様を定義する。
#   - 02_data_spec.yaml で定義したデータを画面上でどのように扱うかを定義する。
#   - API仕様の詳細は 04_api_spec.yaml に分割する。
#   - インフラ、バッチ、自動取得処理は 05_infra_spec.yaml に分割する。
#
# 分割ファイル構成:
#   - 01_overall_spec.yaml : 全体仕様
#   - 02_data_spec.yaml    : データ仕様・フォルダ構成・画像保存仕様
#   - 03_ui_spec.yaml      : UI仕様・画面遷移・画面項目
#   - 04_api_spec.yaml     : API仕様
#   - 05_infra_spec.yaml   : インフラ仕様・バッチ・運用構成
#
# バージョン:
#   Ver0.8
#
# 注意:
#   本仕様は現時点の会話内容をもとにした初期整理版であり、
#   未決事項は pending_items に明示する。
# ==============================================================================


# ==============================================================================
# 修正履歴
# ==============================================================================
revision_history:
  - version: "0.8"
    date: "2026-06-18"
    author: "ChatGPT"
    changes:
      - "初版作成"
      - "ログイン画面、企業選択画面、現場選択画面のUI仕様を定義"
      - "権限別のログイン後初期画面と画面遷移を定義"
      - "カメラリスト・静止画サムネイル画面のUI仕様を定義"
      - "画像存在日付のみ選択可能なカレンダー仕様を定義"
      - "サムネイルのダブルクリックによる原寸画像表示を定義"
      - "設定メニュー、カメラ設定画面、カメラ登録・再設定共通画面を定義"
      - "カメラ削除、接続テスト、パスワード上書き仕様をUI仕様として反映"
      - "左側カメラメニューのチェック選択と複数カメラ最新画像まとめ表示画面を定義"
      - "一般ユーザーにはカメラ管理メニューを表示しない制御を定義"
      - "ユーザー管理画面、企業選択・現場選択からのユーザー管理遷移、ロール別の追加・編集・削除条件を追記"
      - "企業削除・現場削除時に関連ユーザーも削除対象とする確認文と副作用を追記"


# ==============================================================================
# UI基本方針
# ==============================================================================
ui_policy:
  description: >
    本システムは、企業、現場、カメラを階層的に選択し、
    取得済み静止画をサムネイル形式で参照するWeb UIとする。
    権限に応じて初期表示画面、操作可能範囲、メニュー表示を制御する。

  application_type: "Webアプリケーション"

  primary_layout_policy:
    - "権限に応じてログイン後の初期画面を切り替える"
    - "現場選択後、または所属現場が固定されているユーザーでは、カメラリスト・静止画サムネイル画面を表示する"
    - "カメラリストは画面左側、静止画サムネイル一覧は画面右側に配置する"
    - "画像が存在する日付のみカレンダーで選択可能とする"
    - "カメラ管理機能は設定メニューから起動する"
    - "複数カメラ最新画像まとめ表示は、左側カメラメニューのチェックボックス選択から起動する"

  responsive_policy:
    desktop_first: true
    tablet_support: "未決"
    smartphone_support: "未決"
    note: "100台規模のカメラ管理画面であるため、Ver0.8ではPCブラウザ利用を主対象とする"

  language:
    default: "ja-JP"

  timezone:
    display_timezone: "Asia/Tokyo"

  authentication_state_policy:
    source_of_truth: "server_session"
    rules:
      - "ログイン成功後、後続APIが認証済みで呼べることを前提とする"
      - "ユーザー情報をlocalStorage等へ保存してもよいが、表示キャッシュ用途に限定する"
      - "localStorage等の保存情報だけで認証済み画面を確定表示してはならない"
      - "ブラウザリフレッシュ時は /api/v1/auth/me/ を呼び、200の場合のみログイン後画面を復元する"
      - "/api/v1/auth/me/ が401または403の場合は保存済みユーザー情報を削除し、ログイン画面を表示する"
      - "認証必須APIで401または403が返った場合、モックデータへ自動フォールバックしてはならない"
      - "開発用モックは VITE_USE_MOCK=true 等の明示設定時のみ使用する"
    loading_behavior:
      - "リフレッシュ直後から /api/v1/auth/me/ の結果が返るまでは認証確認中表示を出す"
      - "認証確認中にログイン画面を一瞬表示してから遷移する挙動は禁止する"

  view_state_persistence_policy:
    description: "ブラウザリフレッシュ後も、ユーザーが表示中だった画面と選択状態を維持する"
    storage: "localStorage等のクライアント側表示状態キャッシュ"
    restore_timing:
      - "ブラウザリフレッシュ時は /api/v1/auth/me/ による認証確認が成功した後に復元する"
      - "認証確認が失敗した場合は保存済み表示状態を破棄し、ログイン画面を表示する"
    persisted_items:
      - "表示中画面ID"
      - "選択中企業"
      - "選択中現場"
      - "選択中カメラ"
      - "選択中日付"
      - "複数カメラ最新画像まとめ表示用のチェック中カメラ"
      - "カメラ登録・再設定画面の編集対象カメラ"
    rules:
      - "同一ログインユーザーの場合のみ保存済み表示状態を復元する"
      - "ログアウト時、認証失敗時、または別ユーザーでログインした場合は保存済み表示状態を利用しない"
      - "リフレッシュ後に権限別初期画面へ戻してはならず、可能な限り直前の表示中画面を維持する"
      - "復元に必要な企業、現場、カメラ、画像日付などの一覧データは、復元後にAPIから再取得する"
      - "保存済み表示状態は画面復元のための補助情報であり、権限判定や認証判定の根拠にしてはならない"


# ==============================================================================
# 画面ID一覧
# ==============================================================================
screens:
  - screen_id: "SCR_LOGIN"
    name: "ログイン画面"

  - screen_id: "SCR_COMPANY_SELECT"
    name: "企業選択画面"

  - screen_id: "SCR_COMPANY_FORM"
    name: "企業追加画面"

  - screen_id: "SCR_SITE_SELECT"
    name: "現場選択画面"

  - screen_id: "SCR_SITE_FORM"
    name: "現場追加画面"

  - screen_id: "SCR_CAMERA_THUMBNAIL"
    name: "カメラリスト・静止画サムネイル画面"

  - screen_id: "SCR_ORIGINAL_IMAGE_VIEW"
    name: "原寸画像表示画面"

  - screen_id: "SCR_CAMERA_SETTING"
    name: "カメラ設定画面"

  - screen_id: "SCR_CAMERA_FORM"
    name: "カメラ登録・再設定共通画面"

  - screen_id: "SCR_MULTI_CAMERA_LATEST"
    name: "複数カメラ最新画像まとめ表示画面"

  - screen_id: "SCR_USER_MANAGEMENT"
    name: "ユーザー管理画面"


# ==============================================================================
# 権限別初期画面
# ==============================================================================
role_initial_screen:
  system_admin:
    role_name: "システム管理者"
    after_login_screen: "SCR_COMPANY_SELECT"
    description: "全企業を参照できるため、ログイン後は企業選択画面を表示する"

  company_admin:
    role_name: "企業管理者"
    after_login_screen: "SCR_SITE_SELECT"
    description: "所属企業が固定されるため、ログイン後は現場選択画面を表示する"

  site_admin:
    role_name: "現場管理者"
    after_login_screen: "SCR_CAMERA_THUMBNAIL"
    description: "所属現場が固定されるため、ログイン後はカメラリスト・静止画サムネイル画面を表示する"

  general_user:
    role_name: "一般ユーザー"
    after_login_screen: "SCR_CAMERA_THUMBNAIL"
    description: "所属現場が固定されるため、ログイン後はカメラリスト・静止画サムネイル画面を表示する"


# ==============================================================================
# 共通UI部品
# ==============================================================================
common_components:
  header:
    description: "全画面共通ヘッダー"
    display_items:
      - "システム名"
      - "ユーザー管理ボタン"
      - "ログインユーザー名"
      - "ユーザー権限"
      - "ログアウトボタン"
    layout_rules:
      - "ユーザー管理ボタンはログインユーザー名表示の左側に配置する"
      - "ユーザー管理ボタンはsystem_admin、company_adminにのみ表示する"
      - "SCR_USER_MANAGEMENT表示中はユーザー管理ボタンを非表示にする"
    optional_items:
      - "選択中企業名"
      - "選択中現場名"

  breadcrumb:
    description: "現在の選択階層を表示する"
    display_examples:
      - "企業選択"
      - "A社 > 現場選択"
      - "A社 > 札幌第1現場 > カメラ画像"
    enabled: true

  loading_indicator:
    description: "API通信中、画像読み込み中に表示する"
    display_text: "読み込み中..."

  error_message_area:
    description: "通信エラー、入力エラー、権限エラーなどを表示する共通領域"

  confirm_dialog:
    description: "削除など取り消しにくい操作の前に確認するダイアログ"
    buttons:
      - "OK"
      - "キャンセル"

  toast_message:
    description: "保存完了、接続テスト成功など一時的な結果通知に使用する"
    examples:
      - "保存しました"
      - "接続テストに成功しました"
      - "削除しました"


# ==============================================================================
# 画面遷移定義
# ==============================================================================
screen_transitions:
  login_success:
    from: "SCR_LOGIN"
    to_by_role:
      system_admin: "SCR_COMPANY_SELECT"
      company_admin: "SCR_SITE_SELECT"
      site_admin: "SCR_CAMERA_THUMBNAIL"
      general_user: "SCR_CAMERA_THUMBNAIL"

  company_selected:
    from: "SCR_COMPANY_SELECT"
    to: "SCR_SITE_SELECT"
    allowed_roles:
      - "system_admin"

  open_company_add_form:
    from: "SCR_COMPANY_SELECT"
    to: "SCR_COMPANY_FORM"
    trigger: "企業追加ボタン押下"
    allowed_roles:
      - "system_admin"

  company_created:
    from: "SCR_COMPANY_FORM"
    to: "SCR_COMPANY_SELECT"
    trigger: "保存成功"
    allowed_roles:
      - "system_admin"

  open_user_management_from_header:
    from: "共通ヘッダー"
    to: "SCR_USER_MANAGEMENT"
    trigger: "ヘッダーのユーザー管理ボタン押下"
    allowed_roles:
      - "system_admin"
      - "company_admin"
    description: "system_adminは全企業を対象に全ロールを管理し、company_adminは所属企業配下の現場管理者・一般ユーザーを管理する"

  site_selected:
    from: "SCR_SITE_SELECT"
    to: "SCR_CAMERA_THUMBNAIL"
    allowed_roles:
      - "system_admin"
      - "company_admin"

  open_site_add_form:
    from: "SCR_SITE_SELECT"
    to: "SCR_SITE_FORM"
    trigger: "現場追加ボタン押下"
    allowed_roles:
      - "system_admin"
      - "company_admin"

  site_created:
    from: "SCR_SITE_FORM"
    to: "SCR_SITE_SELECT"
    trigger: "保存成功"
    allowed_roles:
      - "system_admin"
      - "company_admin"

  open_original_image:
    from: "SCR_CAMERA_THUMBNAIL"
    to: "SCR_ORIGINAL_IMAGE_VIEW"
    trigger: "サムネイルをダブルクリック"
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
      - "general_user"

  open_camera_setting:
    from: "SCR_CAMERA_THUMBNAIL"
    to: "SCR_CAMERA_SETTING"
    trigger: "設定メニューからカメラ設定を選択"
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"

  open_camera_add_form:
    from: "SCR_CAMERA_SETTING"
    to: "SCR_CAMERA_FORM"
    trigger: "カメラ追加ボタン押下"
    mode: "add"
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"

  open_camera_edit_form:
    from: "SCR_CAMERA_SETTING"
    to: "SCR_CAMERA_FORM"
    trigger: "カメラ行の編集ボタン押下、または行ダブルクリック"
    mode: "edit"
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"

  open_multi_camera_latest:
    from: "SCR_CAMERA_THUMBNAIL"
    to: "SCR_MULTI_CAMERA_LATEST"
    trigger: "左側カメラメニューでチェックを入れ、まとめて参照ボタンを押下"
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
      - "general_user"

  back_to_thumbnail:
    from:
      - "SCR_ORIGINAL_IMAGE_VIEW"
      - "SCR_CAMERA_SETTING"
      - "SCR_MULTI_CAMERA_LATEST"
    to: "SCR_CAMERA_THUMBNAIL"
    trigger: "戻るボタン押下"


# ==============================================================================
# SCR_LOGIN: ログイン画面
# ==============================================================================
SCR_LOGIN:
  name: "ログイン画面"
  purpose: "ユーザーがログインIDとパスワードを入力し、システムにログインする"

  access:
    public: true
    required_authentication: false

  layout:
    type: "centered_form"
    components:
      - "システム名"
      - "ログインID入力"
      - "パスワード入力"
      - "ログインボタン"
      - "エラーメッセージ表示領域"

  fields:
    login_id:
      label: "ログインID"
      input_type: "text"
      required: true
      placeholder: "ログインIDを入力"

    password:
      label: "パスワード"
      input_type: "password"
      required: true
      placeholder: "パスワードを入力"

  actions:
    login:
      label: "ログイン"
      trigger: "ボタン押下"
      validation:
        - "ログインID必須"
        - "パスワード必須"
      success:
        description: "認証成功後、権限に応じた初期画面へ遷移する"
        transition_rule: "role_initial_screen に従う"
        required_post_condition:
          - "同一ブラウザセッションで認証必須APIを呼び出せること"
          - "リフレッシュ後に /api/v1/auth/me/ でログイン状態を復元できること"
      failure:
        message: "ログインIDまたはパスワードが正しくありません"

  notes:
    - "パスワード再発行機能の有無はVer0.8では未決"
    - "ログイン保持、セッションタイムアウトは04_api_spec.yamlまたは05_infra_spec.yamlで定義予定"


# ==============================================================================
# SCR_COMPANY_SELECT: 企業選択画面
# ==============================================================================
SCR_COMPANY_SELECT:
  name: "企業選択画面"
  purpose: "システム管理者が参照・管理対象の企業を選択する"

  access:
    allowed_roles:
      - "system_admin"
    denied_roles:
      - "company_admin"
      - "site_admin"
      - "general_user"

  layout:
    type: "list_or_card_selection"
    components:
      - "ヘッダー"
      - "パンくず"
      - "企業一覧"
      - "検索・絞り込み欄"
      - "選択ボタン"
      - "企業追加ボタン"
      - "企業削除ボタン"

  display_items:
    company_list:
      source: "company"
      columns:
        - key: "company_name"
          label: "企業名"
        - key: "status"
          label: "状態"
        - key: "site_count"
          label: "現場数"
          optional: true
        - key: "camera_count"
          label: "カメラ数"
          optional: true

  actions:
    select_company:
      label: "選択"
      trigger:
        - "企業行をクリックして選択ボタン押下"
        - "企業行をダブルクリック"
      result:
        selected_context:
          - "company_id"
          - "company_name"
        transition_to: "SCR_SITE_SELECT"

    search_company:
      label: "検索"
      trigger: "検索条件入力"
      behavior: "企業名で絞り込み"

    open_company_add:
      label: "企業追加"
      trigger: "企業追加ボタン押下"
      transition_to: "SCR_COMPANY_FORM"

    delete_company:
      label: "企業削除"
      trigger: "企業削除ボタン押下"
      api: "DELETE /api/v1/companies/{company_id}/"
      confirmation:
        required: true
        message: "選択した企業を削除します。配下の現場、カメラ、撮影済みデータ、関連ユーザーもすべて削除されます。よろしいですか？"
        buttons:
          - "削除"
          - "キャンセル"
      result:
        success_message: "企業を削除しました"
        failure_message: "企業の削除に失敗しました"
      side_effects:
        - "対象企業配下の現場を削除する"
        - "対象企業配下のカメラを削除する"
        - "対象企業配下の撮影済み画像メタデータ、画像ファイル、サムネイルを削除する"
        - "対象企業に所属する企業管理者、現場管理者、一般ユーザーを削除する"
        - "対象企業配下の現場に所属する現場管理者、一般ユーザーを削除する"

  empty_state:
    message: "表示可能な企業がありません"

  notes:
    - "企業追加は企業名のみ入力する"
    - "企業削除時は撮影済みデータと関連ユーザーも削除対象とし、確認ダイアログに明記する"
    - "企業コード等の保存用識別子はサーバー側で採番または生成する"


# ==============================================================================
# SCR_COMPANY_FORM: 企業追加画面
# ==============================================================================
SCR_COMPANY_FORM:
  name: "企業追加画面"
  purpose: "システム管理者が新規企業を登録する"

  access:
    allowed_roles:
      - "system_admin"
    denied_roles:
      - "company_admin"
      - "site_admin"
      - "general_user"

  layout:
    type: "single_form"
    components:
      - "ヘッダー"
      - "パンくず"
      - "企業名入力欄"
      - "保存ボタン"
      - "キャンセルボタン"

  form_fields:
    company_name:
      label: "企業名"
      input_type: "text"
      required: true
      max_length: 255
      placeholder: "企業名を入力"

  actions:
    save:
      label: "保存"
      trigger: "保存ボタン押下"
      api: "POST /api/v1/companies/"
      validation:
        - "企業名必須"
      success:
        message: "企業を登録しました"
        transition_to: "SCR_COMPANY_SELECT"

    cancel:
      label: "キャンセル"
      trigger: "キャンセルボタン押下"
      transition_to: "SCR_COMPANY_SELECT"

  notes:
    - "企業追加画面では企業名のみ入力する"
    - "企業ID、企業コード、状態、作成日時、更新日時はサーバー側で設定する"


# ==============================================================================
# SCR_SITE_SELECT: 現場選択画面
# ==============================================================================
SCR_SITE_SELECT:
  name: "現場選択画面"
  purpose: "対象企業配下の現場を選択する"

  access:
    allowed_roles:
      - "system_admin"
      - "company_admin"
    denied_roles:
      - "site_admin"
      - "general_user"

  context:
    system_admin:
      required_context:
        - "selected_company_id"
      description: "企業選択画面で選択された企業配下の現場を表示する"

    company_admin:
      required_context:
        - "user.company_id"
      description: "ログインユーザーの所属企業配下の現場を表示する"

  layout:
    type: "list_or_card_selection"
    components:
      - "ヘッダー"
      - "パンくず"
      - "現場一覧"
      - "検索・絞り込み欄"
      - "選択ボタン"
      - "現場追加ボタン"
      - "現場削除ボタン"
      - "戻るボタン"

  display_items:
    site_list:
      source: "site"
      columns:
        - key: "site_name"
          label: "現場名"
        - key: "status"
          label: "状態"
        - key: "camera_count"
          label: "カメラ数"
          optional: true
        - key: "latest_captured_at"
          label: "最新取得日時"
          optional: true

  actions:
    select_site:
      label: "選択"
      trigger:
        - "現場行をクリックして選択ボタン押下"
        - "現場行をダブルクリック"
      result:
        selected_context:
          - "site_id"
          - "site_name"
        transition_to: "SCR_CAMERA_THUMBNAIL"

    search_site:
      label: "検索"
      trigger: "検索条件入力"
      behavior: "現場名で絞り込み"

    open_site_add:
      label: "現場追加"
      trigger: "現場追加ボタン押下"
      transition_to: "SCR_SITE_FORM"

    delete_site:
      label: "現場削除"
      trigger: "現場削除ボタン押下"
      api: "DELETE /api/v1/sites/{site_id}/"
      confirmation:
        required: true
        message: "選択した現場を削除します。配下のカメラ、撮影済みデータ、関連ユーザーもすべて削除されます。よろしいですか？"
        buttons:
          - "削除"
          - "キャンセル"
      result:
        success_message: "現場を削除しました"
        failure_message: "現場の削除に失敗しました"
      side_effects:
        - "対象現場配下のカメラを削除する"
        - "対象現場配下の撮影済み画像メタデータ、画像ファイル、サムネイルを削除する"
        - "対象現場に所属する現場管理者、一般ユーザーを削除する"

    back:
      label: "戻る"
      visible_roles:
        - "system_admin"
      transition_to: "SCR_COMPANY_SELECT"

  empty_state:
    message: "表示可能な現場がありません"

  notes:
    - "現場追加は所属企業と現場名のみ入力する"
    - "現場削除時は撮影済みデータと関連ユーザーも削除対象とし、確認ダイアログに明記する"
    - "system_adminは企業選択画面で選択中の企業を初期値とする"
    - "company_adminはログインユーザーの所属企業を固定値とする"


# ==============================================================================
# SCR_SITE_FORM: 現場追加画面
# ==============================================================================
SCR_SITE_FORM:
  name: "現場追加画面"
  purpose: "システム管理者または企業管理者が新規現場を登録する"

  access:
    allowed_roles:
      - "system_admin"
      - "company_admin"
    denied_roles:
      - "site_admin"
      - "general_user"

  context:
    system_admin:
      required_context:
        - "selected_company_id"
      description: "企業選択画面で選択された企業を所属企業の初期値とする"

    company_admin:
      required_context:
        - "user.company_id"
      description: "ログインユーザーの所属企業を所属企業として固定する"

  layout:
    type: "single_form"
    components:
      - "ヘッダー"
      - "パンくず"
      - "所属企業表示"
      - "現場名入力欄"
      - "保存ボタン"
      - "キャンセルボタン"

  form_fields:
    company_id:
      label: "所属企業"
      input_type: "select_or_readonly"
      required: true
      behavior:
        system_admin: "選択中企業を初期値として表示。必要に応じて企業一覧から選択可能"
        company_admin: "所属企業を読み取り専用表示"

    site_name:
      label: "現場名"
      input_type: "text"
      required: true
      max_length: 255
      placeholder: "現場名を入力"

  actions:
    save:
