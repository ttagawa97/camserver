    from_screen: "SCR_CAMERA_THUMBNAIL"
    trigger: "サムネイルをダブルクリック"

  layout:
    type: "modal_or_page"
    status: "未決"
    recommendation: "モーダル表示"
    components:
      - "原寸画像"
      - "カメラ名"
      - "取得日時"
      - "閉じるボタン"
      - "前の画像ボタン"
      - "次の画像ボタン"

  display_items:
    image:
      source: "captured_image.file_path"
