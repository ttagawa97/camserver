  notes:
    - "現場追加画面では所属企業と現場名のみ入力する"
    - "現場ID、現場コード、状態、作成日時、更新日時はサーバー側で設定する"


# ==============================================================================
# SCR_CAMERA_THUMBNAIL: カメラリスト・静止画サムネイル画面
# ==============================================================================
SCR_CAMERA_THUMBNAIL:
  name: "カメラリスト・静止画サムネイル画面"
  purpose: "選択中または所属現場のカメラ一覧と、取得済み静止画サムネイルを表示する"

  access:
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
      - "general_user"

  context:
    system_admin:
      required_context:
        - "selected_company_id"
        - "selected_site_id"

    company_admin:
      required_context:
        - "user.company_id"
        - "selected_site_id"

    site_admin:
      required_context:
        - "user.company_id"
        - "user.site_id"

    general_user:
      required_context:
        - "user.company_id"
        - "user.site_id"

  layout:
    type: "two_pane"
    header_area:
      components:
        - "ヘッダー"
        - "パンくず"
        - "選択中企業名"
        - "選択中現場名"
        - "設定メニュー"
        - "日付選択カレンダー"
    left_pane:
      name: "カメラメニュー"
      width_policy: "固定または可変"
      components:
        - "カメラリスト"
        - "カメラ選択チェックボックス"
        - "まとめて参照ボタン"
    right_pane:
      name: "静止画サムネイル一覧"
      components:
        - "選択日付表示"
        - "サムネイルグリッド"
        - "画像なしメッセージ"
        - "読み込み状態表示"

  camera_menu:
    description: "画面左側に表示する登録済みカメラリスト"
    source: "camera"
    filter: "現在の現場に所属するactiveカメラ"
    display_items:
      - key: "checkbox"
        label: "選択"
        purpose: "複数カメラ最新画像まとめ表示用"
      - key: "camera_name"
        label: "カメラ名"
      - key: "last_capture_status"
        label: "状態"
        optional: true
      - key: "last_capture_at"
        label: "最終取得"
        optional: true

    status_display:
      success:
        label: "正常"
      failed:
        label: "取得失敗"
      not_yet:
        label: "未取得"

    selection_behavior:
      single_click:
        description: "対象カメラを選択し、右側に選択カメラのサムネイルを表示する"
      checkbox_click:
        description: "複数カメラ最新画像まとめ表示の対象としてチェック状態を切り替える"

  date_selector:
    description: "画像が存在する日付のみ選択可能なカレンダー"
    implementation_policy:
      library: "DayPicker（React用カレンダーコンポーネント）"
      display_mode: "プルダウン方式"
      closed_state:
        display_text_format: "yyyy-mm-dd(曜)"
        examples:
          - "2026-06-29(月)"
        description: "カレンダーを閉じている状態では、選択中日付のみを日付プルダウンボタンとして表示する"
      opened_state:
        description: "日付プルダウンボタン押下時に、ボタン直下へカレンダーをポップアップ表示する"
        close_triggers:
          - "日付選択"
          - "カレンダー外クリック"
          - "Escapeキー押下"
      layout:
        placement: "カメラ名表示領域の右側"
        camera_name_width: "最大30文字相当の固定幅"
        camera_name_overflow: "固定幅を超える場合は1行省略表示（ellipsis）"
        gap_between_camera_name_and_selector: "カメラ名と日付プルダウンが近接しないよう十分な余白を確保する"
      sizing:
        calendar_width: "サムネイル表示領域を圧迫しない小型幅とする"
        day_cell_spacing: "日付と日付の表示間隔を狭くし、1か月分がコンパクトに収まること"
        note: "グローバルなtable/th/tdスタイルによりDayPicker内部の表が横長化しないよう、カレンダー内のtableはmin-width:0、th/tdはpadding:0で上書きする"
    default_date:
      value: "latest_available_date"
      description: "画像が存在する最新日付を初期選択する"

    selectable_date_rule:
      enabled_dates: "画像が存在する日付"
      disabled_dates: "画像が存在しない日付"
      visual_rule:
        enabled_dates: "画像が存在する日付は選択可能であることが分かる色を付ける"
        disabled_dates: "画像が存在しない日付はグレーアウトし、クリックしても日付変更しない"

    date_scope:
      status: "未決"
      candidate_options:
        - "選択中カメラに画像が存在する日付"
        - "現場内いずれかのカメラに画像が存在する日付"
      recommendation: "選択中カメラに画像が存在する日付"

    on_change:
      description: "日付変更時、右側のサムネイル一覧を再取得する"

  thumbnail_grid:
    description: "右側に表示する静止画サムネイル一覧"
    source: "captured_image"
    filter:
      - "selected_camera_id"
      - "selected_date"
    sort:
      field: "captured_at"
      order: "desc"
    display_items:
      - key: "thumbnail_image"
        label: "サムネイル"
      - key: "captured_at"
        label: "取得時刻"
      - key: "camera_name"
        label: "カメラ名"
        optional: true

    empty_state:
      message: "選択した日付の画像はありません"

    actions:
      open_original:
        trigger: "サムネイルをダブルクリック"
        transition_to: "SCR_ORIGINAL_IMAGE_VIEW"

  setting_menu:
    description: "カメラ管理機能を開くための設定メニュー"
    visible_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
    hidden_roles:
      - "general_user"
    menu_items:
      - key: "camera_setting"
        label: "カメラ設定"
        transition_to: "SCR_CAMERA_SETTING"

    notes:
      - "一般ユーザーには設定メニューを表示しない"
      - "設定メニューの名称、位置、アイコンは03_ui_specの詳細デザイン段階で調整可能"

  multi_camera_button:
    label: "まとめて参照"
    description: "チェックされた複数カメラの最新画像まとめ表示画面へ遷移する"
    visible_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
      - "general_user"
    enabled_condition:
      - "チェックされたカメラが1台以上存在する"
    disabled_condition:
      - "チェックされたカメラが0台"
    action:
      transition_to: "SCR_MULTI_CAMERA_LATEST"
      pass_parameters:
        - "selected_camera_ids"

  navigation_actions:
    back_to_site_select:
      label: "現場選択へ戻る"
      visible_roles:
        - "system_admin"
        - "company_admin"
      transition_to: "SCR_SITE_SELECT"

    back_to_company_select:
      label: "企業選択へ戻る"
      visible_roles:
        - "system_admin"
      transition_to: "SCR_COMPANY_SELECT"

  notes:
    - "サムネイル画面は過去画像参照が主目的"
    - "複数カメラ最新画像まとめ表示画面は現在状況の監視が主目的"
    - "画面自体がカメラへ直接アクセスすることは禁止し、サーバー保存済み画像を参照する"


# ==============================================================================
# SCR_ORIGINAL_IMAGE_VIEW: 原寸画像表示画面
# ==============================================================================
SCR_ORIGINAL_IMAGE_VIEW:
  name: "原寸画像表示画面"
  purpose: "サムネイルで選択された画像を原寸表示する"

