      │ カメラメニュー     │ 静止画サムネイル一覧                    │
      │                  │                                         │
      │ ☑ Camera001      │ [画像] [画像] [画像] [画像]              │
      │ ☐ Camera002      │ [画像] [画像] [画像] [画像]              │
      │ ☑ Camera003      │                                         │
