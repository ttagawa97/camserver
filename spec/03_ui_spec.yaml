    previous_image:
      label: "前へ"
      behavior: "同一カメラ・同一日付内で前の画像を表示"
      status: "未決"

    next_image:
      label: "次へ"
      behavior: "同一カメラ・同一日付内で次の画像を表示"
      status: "未決"

    download:
      label: "ダウンロード"
      visible: "未決"
      description: "画像ダウンロード可否が未決のためVer0.8では保留"

  notes:
    - "原寸画像とは、サーバー側で保存画質に変換された保存画像を指す"
    - "カメラから取得した変換前画像を保持するかは02_data_spec.yamlの未決事項に従う"


# ==============================================================================
# SCR_CAMERA_SETTING: カメラ設定画面
# ==============================================================================
SCR_CAMERA_SETTING:
  name: "カメラ設定画面"
  purpose: "登録済みカメラ一覧を表示し、カメラ追加、再設定、削除、接続テストを実行する"

  access:
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
    denied_roles:
      - "general_user"

  context:
    system_admin:
      required_context:
        - "selected_company_id"
        - "selected_site_id"

    company_admin:
      required_context:
        - "user.company_id"
        - "selected_site_id"

    site_admin:
      required_context:
        - "user.company_id"
        - "user.site_id"

  layout:
    type: "table_management"
    components:
      - "ヘッダー"
      - "パンくず"
      - "カメラ追加ボタン"
      - "カメラ一覧テーブル"
      - "戻るボタン"
      - "結果メッセージ表示領域"

  camera_table:
    source: "camera"
    filter: "現在の現場に所属するactiveカメラ"
    columns:
      - key: "camera_name"
        label: "カメラ名"
      - key: "address"
        label: "アドレス"
      - key: "auth_method"
        label: "認証方式"
      - key: "capture_interval_minutes"
        label: "取得間隔"
        format: "{value}分"
      - key: "image_quality"
        label: "保存画質"
        format: "{quality_label}（{width}×{height}px）"
      - key: "retention_days"
        label: "保存期間"
        format: "{value}日"
      - key: "last_capture_status"
        label: "取得状態"
      - key: "last_capture_at"
        label: "最終取得日時"
      - key: "actions"
        label: "操作"
        buttons:
          - "編集"
          - "削除"
          - "接続テスト"

  actions:
    add_camera:
      label: "カメラ追加"
      trigger: "ボタン押下"
      transition_to: "SCR_CAMERA_FORM"
      mode: "add"

    edit_camera:
      label: "編集"
      trigger:
        - "編集ボタン押下"
        - "カメラ行ダブルクリック"
      transition_to: "SCR_CAMERA_FORM"
      mode: "edit"
      pass_parameters:
        - "camera_id"

    delete_camera:
      label: "削除"
      trigger: "削除ボタン押下"
      confirmation:
        required: true
        title: "カメラ削除確認"
        message: "選択したカメラを削除します。撮影済みデータも削除されます。よろしいですか？"
        buttons:
          - "削除"
          - "キャンセル"
      result:
        success_message: "カメラを削除しました"
        failure_message: "カメラの削除に失敗しました"
      side_effects:
        - "対象カメラの撮影済み画像メタデータ、画像ファイル、サムネイルを削除する"

    connection_test:
      label: "接続テスト"
      trigger: "接続テストボタン押下"
      description: "登録済みのカメラ設定を使用して接続テストを実行する"
      result:
        success_message: "接続テストに成功しました"
        failure_message: "接続テストに失敗しました"
      optional_preview:
        enabled: "未決"
        description: "成功時に取得画像プレビューを表示するかは未決"

    back:
      label: "戻る"
      transition_to: "SCR_CAMERA_THUMBNAIL"

  empty_state:
    message: "登録済みカメラがありません"
    suggested_action: "カメラ追加ボタンからカメラを登録してください"

  notes:
    - "一般ユーザーはこの画面へ遷移不可"
    - "カメラ削除時は撮影済みデータも削除対象とし、確認ダイアログに明記する"
    - "接続テストは入力中フォームからも実行可能とする"


# ==============================================================================
# SCR_CAMERA_FORM: カメラ登録・再設定共通画面
# ==============================================================================
SCR_CAMERA_FORM:
  name: "カメラ登録・再設定共通画面"
  purpose: "新規カメラ登録、および既存カメラの再設定を共通フォームで行う"

  access:
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
    denied_roles:
      - "general_user"

  modes:
    add:
      title: "カメラ追加"
      description: "新規カメラを登録する"
      required_context:
        - "company_id"
        - "site_id"

    edit:
      title: "カメラ再設定"
      description: "既存カメラの設定を変更する"
      required_context:
        - "camera_id"

  layout:
    type: "form"
    components:
      - "画面タイトル"
      - "カメラ名入力"
      - "アドレス入力"
      - "認証方式選択"
      - "ID入力"
      - "パスワード入力"
      - "取得間隔入力"
      - "保存画質選択"
      - "保存期間入力"
      - "接続テストボタン"
      - "保存ボタン"
      - "キャンセルボタン"
      - "入力エラーメッセージ表示領域"
      - "接続テスト結果表示領域"

  fields:
    camera_name:
      label: "カメラ名"
      input_type: "text"
      required: true
      max_length: 100
      placeholder: "例：正面入口カメラ"

    address:
      label: "アドレス"
      input_type: "text"
      required: true
      max_length: 2048
      placeholder: "例：http://192.168.1.10/snapshot.jpg"
      validation:
        - "HTTPまたはHTTPS形式"
      note: "RTSP等を許可するかは未決"

    auth_method:
      label: "認証方式"
      input_type: "select"
      required: true
      allowed_values:
        - value: "basic"
          label: "BASIC認証"
      default: "basic"
      disabled: true
      note: "Ver0.8ではBASIC認証のみのため固定表示でも可"

    login_id:
      label: "ID"
      input_type: "text"
      required: true
      max_length: 255
      placeholder: "カメラ接続用ID"

    password:
      label: "パスワード"
      input_type: "password"
      required_condition: "追加時は必須。再設定時は任意"
      max_length: 1024
      placeholder:
        add_mode: "カメラ接続用パスワード"
        edit_mode: "変更する場合のみ入力"
      update_rule: "再設定時は入力された場合のみ既存パスワードを上書きし、空欄の場合は変更しない"
      note: "既存パスワードは画面表示しない"

    capture_interval_minutes:
      label: "取得間隔"
      input_type: "number"
      required: true
      unit: "分"
      unit_display: "入力欄の右側に「分」を表示する"
      min: 1
      placeholder: "1"
      description: "静止画取得間隔。最短1分"

    image_quality:
      label: "保存画質"
      input_type: "select"
      required: true
      allowed_values:
        - value: "VGA"
          label: "VGA (640×480px)"
          width: 640
          height: 480
        - value: "SVGA"
          label: "SVGA (800×600px)"
          width: 800
          height: 600
        - value: "WXGA"
          label: "WXGA (1280×800px)"
          width: 1280
          height: 800
        - value: "HD"
          label: "HD (1280×720px)"
          width: 1280
          height: 720
        - value: "FullHD"
          label: "FullHD (1920×1080px)"
          width: 1920
          height: 1080
        - value: "4K"
          label: "4K (3840×2160px)"
          width: 3840
          height: 2160
      description: "サーバー側で指定画質へ変換して保存する"

    retention_days:
      label: "保存期間"
      input_type: "number"
      required: true
      unit: "日"
      unit_display: "入力欄の右側に「日」を表示する"
      min: 1
      placeholder: "30"
      description: "画像ファイルを保存する期間"

  actions:
    connection_test:
      label: "接続テスト"
      trigger: "ボタン押下"
      description: "フォーム入力中の内容を使ってカメラ接続をテストする"
      validation_before_test:
        - "アドレス必須"
        - "認証方式必須"
        - "ID必須"
        - "追加時はパスワード必須"
        - "再設定時はパスワード空欄の場合、登録済みパスワードで接続テストする"
      success:
        message: "接続テストに成功しました"
        optional_display:
          - "取得画像プレビュー"
          - "HTTPステータス"
          - "応答時間"
      failure:
        message: "接続テストに失敗しました。アドレス、ID、パスワードを確認してください"
        optional_display:
          - "エラー理由"
          - "HTTPステータス"
          - "タイムアウト情報"

    save:
      label: "保存"
      trigger: "ボタン押下"
      validation:
        - "カメラ名必須"
        - "アドレス必須"
        - "認証方式必須"
        - "ID必須"
        - "追加時はパスワード必須"
        - "再設定時はパスワード空欄を許可し、空欄の場合は既存パスワードを変更しない"
        - "取得間隔は1分以上"
        - "保存画質必須"
        - "保存期間は1日以上"
      add_mode:
        success_message: "カメラを登録しました"
        transition_to: "SCR_CAMERA_SETTING"
      edit_mode:
        success_message: "カメラ設定を保存しました"
        transition_to: "SCR_CAMERA_SETTING"

    cancel:
      label: "キャンセル"
      trigger: "ボタン押下"
      confirmation_if_dirty:
        required: true
        message: "入力内容を破棄して戻ります。よろしいですか？"
      transition_to: "SCR_CAMERA_SETTING"

  password_display_rule:
    add_mode:
      default_value: ""
      required: true

    edit_mode:
      display_value: ""
      required: false
      update_method: "入力値がある場合のみ上書き。空欄の場合は変更しない"
      placeholder: "変更する場合のみ入力"
      note: "既存パスワードは画面表示しない"

  connection_test_requirement_before_save:
    status: "未決"
    candidate_options:
      - "保存前の接続テスト必須"
      - "接続テストなしでも保存可能"
    recommendation: "接続テストなしでも保存可能。ただし警告表示する"

  notes:
    - "カメラ登録と再設定は同一フォームとする"
    - "保存画質はサーバー側変換であり、カメラ側の解像度設定ではない"
    - "保存画質の選択肢と一覧表示には画質名だけでなく縦横Pixel数も表示する"
    - "取得間隔入力には単位「分」、保存期間入力には単位「日」を表示する"
    - "再設定時のパスワード空欄は既存パスワード維持を意味する"
    - "接続テストは保存前に実施できるが、必須にするかは未決"


# ==============================================================================
# SCR_MULTI_CAMERA_LATEST: 複数カメラ最新画像まとめ表示画面
# ==============================================================================
SCR_MULTI_CAMERA_LATEST:
  name: "複数カメラ最新画像まとめ表示画面"
  purpose: "選択された複数カメラの最新画像をまとめて表示し、現場状況を確認する"

  access:
    allowed_roles:
      - "system_admin"
      - "company_admin"
      - "site_admin"
      - "general_user"

  entry:
    from_screen: "SCR_CAMERA_THUMBNAIL"
    trigger:
      - "左側カメラメニューで対象カメラにチェックを入れる"
      - "まとめて参照ボタンを押下"
    required_parameters:
      - "selected_camera_ids"

  layout:
    type: "grid_dashboard"
    components:
      - "ヘッダー"
      - "パンくず"
      - "選択中企業名"
      - "選択中現場名"
      - "最終画面更新日時"
      - "最新画像カード一覧"
      - "自動更新状態表示"
      - "戻るボタン"

  display:
    card_layout:
      description: "カメラごとにカード形式で最新画像を表示する"
      items:
        - key: "camera_name"
          label: "カメラ名"
        - key: "latest_image"
          label: "最新画像"
        - key: "latest_captured_at"
          label: "取得日時"
        - key: "latest_status"
          label: "状態"
        - key: "latest_error"
          label: "エラー内容"
          visible_condition: "latest_statusがfailedの場合"

    status_display:
      success:
        label: "正常"
        display: "最新画像を表示"
      failed:
        label: "取得失敗"
        display: "直近の取得失敗情報を表示"
      not_yet:
        label: "未取得"
        display: "未取得メッセージを表示"

  refresh:
    description: "画面表示中は最新画像を常に表示する"
    browser_direct_camera_access: false
    source: "サーバーに保存済みの最新画像"
    method: "APIによる定期再取得"
    interval_seconds:
      status: "未決"
      candidate_options:
        - 30
        - 60
        - "カメラ取得間隔に合わせる"
      recommendation: 60
    update_behavior:
      - "最新画像の取得日時が変わった場合、画像を差し替える"
      - "取得状態が変わった場合、状態表示を更新する"
      - "画面全体を再読み込みせず、カード単位で更新することを推奨"

  actions:
    open_original:
      label: "原寸表示"
      trigger: "最新画像をダブルクリック"
      transition_to: "SCR_ORIGINAL_IMAGE_VIEW"
      description: "最新画像を原寸表示する"

    back:
      label: "戻る"
      trigger: "戻るボタン押下"
      transition_to: "SCR_CAMERA_THUMBNAIL"

    manual_refresh:
      label: "更新"
      trigger: "更新ボタン押下"
      status: "任意"
      description: "自動更新とは別に手動更新を可能にするかは未決"

  empty_state:
    message: "表示対象のカメラが選択されていません"
    action: "カメラリスト画面に戻って対象カメラを選択してください"

  notes:
    - "本画面は現在状況確認用であり、過去画像の一覧参照はSCR_CAMERA_THUMBNAILで行う"
    - "本画面はカメラに直接接続せず、サーバー保存済み最新画像を表示する"
    - "100台すべてを選択した場合の表示レイアウト、ページング、仮想スクロール要否は未決"


# ==============================================================================
# SCR_USER_MANAGEMENT: ユーザー管理画面
# ==============================================================================
SCR_USER_MANAGEMENT:
  name: "ユーザー管理画面"
  purpose: "権限に応じてログインユーザーを追加・編集・削除する"

  access:
    allowed_roles:
      - "system_admin"
      - "company_admin"
    denied_roles:
      - "site_admin"
      - "general_user"

  context:
    system_admin:
      allowed_scope: "全企業・全現場"
      description: "全ロールのユーザーを管理できる"
    company_admin:
      required_context:
        - "user.company_id"
      allowed_scope: "所属企業配下"
      description: "所属企業配下の現場管理者と一般ユーザーのみ管理できる"

  layout:
    type: "list_and_form"
    components:
      - "ヘッダー"
      - "パンくず"
      - "ユーザー一覧"
      - "ユーザー追加ポップアップ"
      - "ユーザー編集ポップアップ"
      - "ユーザー削除確認ポップアップ"
      - "保存ボタン"
      - "削除ボタン"
      - "キャンセルボタン"
      - "戻るボタン"

  display_items:
    user_list:
      source: "user"
      columns:
        - key: "login_id"
          label: "ログインID"
        - key: "user_name"
          label: "ユーザー名"
        - key: "role"
          label: "権限"
        - key: "company_name"
          label: "企業"
          optional: true
        - key: "site_name"
          label: "現場"
          optional: true
        - key: "status"
          label: "状態"

  form_fields:
    login_id:
      label: "ログインID"
      input_type: "text"
      required: true
      max_length: 150
      unique: true
    user_name:
      label: "ユーザー名"
      input_type: "text"
      required: true
      max_length: 255
    password:
      label: "パスワード"
      input_type: "password"
      required_on_create: true
      required_on_update: false
      description: "編集時に空欄の場合は既存パスワードを変更しない"
    role:
      label: "権限"
      input_type: "select"
      required: true
      allowed_values:
        system_admin: "システム管理者"
        company_admin: "企業管理者"
        site_admin: "現場管理者"
        general_user: "一般ユーザー"
    company_id:
      label: "企業"
      input_type: "select"
      required_condition: "roleがcompany_admin、site_admin、general_userの場合は必須"
      visible_condition: "roleがsystem_admin以外の場合に表示する"
      behavior:
        - "system_adminは全企業から選択できる"
        - "company_adminはログインユーザーの所属企業で固定し、変更不可とする"
    site_id:
      label: "現場"
      input_type: "select"
      required_condition: "roleがsite_admin、general_userの場合は必須"
      visible_condition: "roleがsite_adminまたはgeneral_userの場合に表示する"
      behavior:
        - "選択中company_id配下の現場のみ表示する"
        - "選択中company_idを変更した場合、現場選択肢も連動して更新する"
        - "現場選択画面から現場行を選択して遷移した場合、その現場を初期値にする"

  allowed_role_operations:
    system_admin:
      creatable_roles:
        - "system_admin"
        - "company_admin"
        - "site_admin"
        - "general_user"
      editable_roles:
        - "system_admin"
        - "company_admin"
        - "site_admin"
        - "general_user"
      deletable_roles:
        - "system_admin"
        - "company_admin"
        - "site_admin"
        - "general_user"
    company_admin:
      creatable_roles:
        - "site_admin"
        - "general_user"
      editable_roles:
        - "site_admin"
        - "general_user"
      deletable_roles:
        - "site_admin"
        - "general_user"
      fixed_company_id: "login_user.company_id"

  actions:
    load_users:
      api: "GET /api/v1/users/"
      trigger: "画面表示時、検索条件変更時"
      behavior:
        - "system_adminは全ユーザーまたは選択企業・選択現場で絞り込んだユーザーを取得する"
        - "company_adminは所属企業配下の現場管理者・一般ユーザーのみ取得する"

    create_user:
      label: "追加"
      api: "POST /api/v1/users/"
      display: "ユーザー追加ボタン押下時にポップアップで追加フォームを表示する。一覧画面内には常設の入力フォームを表示しない"
      validation:
        - "ログインID必須"
        - "ユーザー名必須"
        - "新規登録時はパスワード必須"
        - "system_admin以外は企業必須"
        - "site_admin、general_userは現場必須"
        - "site_idを指定する場合、site.company_id と company_id が一致すること"
      success:
        message: "ユーザーを登録しました"
        behavior: "ユーザー一覧を再取得する"

    update_user:
      label: "編集"
      api: "PUT /api/v1/users/{user_id}/"
      display: "ユーザー一覧の編集ボタン押下時にポップアップで編集フォームを表示する"
      validation:
        - "作成時と同じ所属・権限整合性を満たすこと"
        - "パスワード空欄の場合はパスワードを変更しない"
      success:
        message: "ユーザーを更新しました"
        behavior: "ユーザー一覧を再取得する"

    delete_user:
      label: "削除"
      api: "DELETE /api/v1/users/{user_id}/"
      display: "ユーザー一覧の削除ボタン押下時に確認ポップアップを表示し、ポップアップ内の削除ボタン押下で削除する"
      confirmation:
        required: true
        message: "選択したユーザーを削除します。よろしいですか？"
      success:
        message: "ユーザーを削除しました"
        behavior: "ユーザー一覧を再取得する"

    back:
      label: "戻る"
      behavior:
        - "企業選択画面から遷移した場合はSCR_COMPANY_SELECTへ戻る"
        - "現場選択画面から遷移した場合はSCR_SITE_SELECTへ戻る"

  empty_state:
    message: "表示可能なユーザーがありません"

  notes:
    - "ユーザー管理の権限制御はUI表示だけでなく、必ずAPI側でも検証する"
    - "一般ユーザーは所属現場配下のカメラ画像のみ参照可能とする"
    - "ユーザー削除後、削除対象ユーザーの既存セッションを無効化するかはサーバー側で検討する"


