# ==============================================================================
# UIバリデーション共通ルール
# ==============================================================================
ui_validation_rules:
  required_field:
    message: "{field_label}は必須です"

  max_length:
    message: "{field_label}は{max_length}文字以内で入力してください"

  numeric_min:
    message: "{field_label}は{min}以上で入力してください"

  camera_address:
    allowed_formats:
      - "http://..."
      - "https://..."
    message: "アドレスはHTTPまたはHTTPS形式で入力してください"

  capture_interval:
    min: 1
    unit: "分"
    message: "取得間隔は1分以上で入力してください"

  retention_days:
    min: 1
    unit: "日"
    message: "保存期間は1日以上で入力してください"

  selected_camera_for_multi_view:
    min_count: 1
    message: "まとめて参照するカメラを1台以上選択してください"


# ==============================================================================
# 画面エラーハンドリング
# ==============================================================================
ui_error_handling:
  authentication_error:
    message: "ログインIDまたはパスワードが正しくありません"

  authorization_error:
    message: "この操作を行う権限がありません"

  api_error:
    message: "サーバーとの通信に失敗しました"

  image_load_error:
    message: "画像を読み込めませんでした"

  camera_connection_test_error:
    message: "接続テストに失敗しました。アドレス、ID、パスワードを確認してください"

  camera_save_error:
    message: "カメラ設定の保存に失敗しました"

  camera_delete_error:
    message: "カメラの削除に失敗しました"

  no_image_date_error:
    message: "選択可能な画像日付がありません"

  session_timeout:
    message: "セッションが切れました。再度ログインしてください"
    transition_to: "SCR_LOGIN"


# ==============================================================================
# UI更新・自動更新方針
# ==============================================================================
ui_refresh_policy:
  thumbnail_screen:
    auto_refresh:
      enabled: false
      description: "通常のサムネイル画面は過去画像参照が主目的のため、Ver0.8では自動更新なし"
    manual_refresh:
      enabled: "未決"

  multi_camera_latest_screen:
    auto_refresh:
      enabled: true
      description: "複数カメラ最新画像画面は最新画像を常に表示するため、自動更新を行う"
      interval_seconds: "未決"
      recommendation: 60
    manual_refresh:
      enabled: "未決"

  camera_setting_screen:
    auto_refresh:
      enabled: false
      description: "設定画面は自動更新しない"


# ==============================================================================
